<!DOCTYPE html>
<html>
<head>
  <title>Audio Canvas</title>
  <link rel="stylesheet" href="style.css?v=004">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@300;400;500&display=swap" rel="stylesheet">
</head>

<body>

  <div id="drop-zone">

    <!-- AXES -->

    <div class="axis-label top">Light/Open/Positive</div>
    <div class="axis-label bottom">Dark/Negative</div>
    <div class="axis-label left">Stable</div>
    <div class="axis-label right">Unstable</div>

    <div class="vertical-axis"></div>
    <div class="horizontal-axis"></div>

    <!-- RELATIONSHIP LINES -->

    <svg id="vector-boundary" viewBox="0 0 100 100">
      <defs>
        <path
          id="vector-boundary-label-path"
          d="M 12 50 A 38 38 0 0 1 88 50"
        />
      </defs>

      <circle cx="50" cy="50" r="38"></circle>

      <text>
        <textPath href="#vector-boundary-label-path" startOffset="50%" text-anchor="middle">
          MAX CHANGE
        </textPath>
      </text>
    </svg>

    <svg id="connection-layer"></svg>

    <!-- INSTRUCTIONS -->

    <div id="instructions">
      <div id="instructions-content"></div>
    </div>

    <!-- UI -->

    <div id="ui-controls">
      <div id="methodology-controls">
        <div class="methodology-option selected" data-methodology="vector_v2">VECTOR_V2 DEMO</div>
      </div>

      <div id="instructions-toggle">ABOUT DEMO</div>
      <div id="reset-button">RESET</div>
    </div>
      
    <div id="vector-readout"></div>
    <div id="export-message"></div>

  </div>

  <script src="app.js?v=004"></script>

</body>
</html>
